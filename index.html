<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimoNiki 7</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; }
body {
background: #3a6ea5 url('wallpaper.jpg') center/cover;
height: 100vh; overflow: hidden; position: relative;
}
.desktop {
padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, 80px);
grid-gap: 20px; justify-content: start; height: calc(100vh - 40px);
}
.icon { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 1px 1px 3px black; font-size: 12px; border-radius: 4px; padding: 5px; }
.icon:hover { background: rgba(255, 255, 255, 0.2); }
.icon img { width: 48px; height: 48px; display: block; margin: 0 auto 5px; }

.window {
position: absolute; top: 120px; left: 120px; width: 420px; height: 320px;
background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
border: 5px solid rgba(255, 255, 255, 0.4); border-top: 3px solid rgba(255, 255, 255, 0.5);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35); border-radius: 8px; display: none; flex-direction: column; z-index: 10; overflow: hidden;
}
.window-header { background: transparent; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; cursor: move; font-weight: bold; font-size: 13px; color: #1e395b; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }
.close-btn {
background: linear-gradient(to bottom, #f16d7a, #e81123); color: white; border: 1px solid #7c121a;
width: 32px; height: 18px; cursor: pointer; border-radius: 3px; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: #f11527; }
.window-content { padding: 10px; flex-grow: 1; overflow: auto; background: #ffffff; margin: 0 1px 1px 1px; border-radius: 0 0 4px 4px; }
.window-content textarea { width: 100%; height: 100%; border: none; resize: none; outline: none; font-size: 14px; }
.window-content iframe { width: 100%; height: 100%; border: none; }

.taskbar {
position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
background: linear-gradient(to bottom, rgba(40,40,40,0.75), rgba(15,15,15,0.85));
backdrop-filter: blur(8px); display: flex; align-items: center; padding: 0 10px; z-index: 100; border-top: 1px solid rgba(255,255,255,0.2);
}
.start-btn { width: 36px; height: 36px; border-radius: 50%; background: #4caf50; cursor: pointer; box-shadow: 0 0 6px rgba(255,255,255,0.6); border: 2px solid #fff; transition: transform 0.1s; }
.start-btn:hover { transform: scale(1.08); }
.system-tray { margin-left: auto; color: white; font-size: 11px; text-align: right; padding-right: 10px; line-height: 1.2; }
#clock-time { font-weight: bold; font-size: 12px; }

.start-menu {
position: fixed; bottom: 45px; left: 5px; width: 250px; background: rgba(255, 255, 255, 0.9);
backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.3); box-shadow: 0 0 15px rgba(0,0,0,0.4); display: none; padding: 10px; border-radius: 6px; z-index: 99;
}
.start-menu-item { padding: 8px 12px; cursor: pointer; display: flex; align-items: center; border-radius: 4px; font-size: 13px; color: #333; }
.start-menu-item:hover { background: rgba(0, 120, 215, 0.2); }
</style>
</head>
<body>

<!-- РАБОЧИЙ СТОЛ -->
<div class="desktop">
<div class="icon" onclick="openWindow('win-explorer')"><img src="explorer-icon.png" alt="X">Проводник</div>
<div class="icon" onclick="openWindow('win-notepad')"><img src="notepad-icon.png" alt="X">Блокнот</div>
<div class="icon" onclick="openWindow('win-paint')"><img src="paint-icon.png" alt="X">Paint</div>
<div class="icon" onclick="openWindow('win-chrome')"><img src="chrome-icon.png" alt="X">Timo Chrome</div>
</div>

<!-- ОКНО: ПРОВОДНИК -->
<div id="win-explorer" class="window">
<div class="window-header"><span>Проводник</span><button class="close-btn" onclick="closeWindow('win-explorer')">X</button></div>
<div class="window-content">
<p style="font-weight: bold; color: #1e395b;">📂 Компьютер / Локальный диск (C:)</p>
<hr style="margin: 10px 0; border: 0; border-top: 1px solid #ccc;">
<ul style="list-style-type: none; padding-left: 5px; line-height: 1.8;">
<li>📁 Папка 1</li>
<li>📁 Папка 2</li>
<li>📄 Секретные файлы.txt</li>
</ul>
</div>
</div>

<!-- ОКНО: БЛОКНОТ -->
<div id="win-notepad" class="window">
<div class="window-header"><span>Блокнот</span><button class="close-btn" onclick="closeWindow('win-notepad')">X</button></div>
<div class="window-content"><textarea placeholder="Введите ваш текст здесь..."></textarea></div>
</div>

<!-- ОКНО: PAINT -->
<div id="win-paint" class="window" style="width: 550px; height: 420px;">
<div class="window-header"><span>Paint</span><button class="close-btn" onclick="closeWindow('win-paint')">X</button></div>
<div class="window-content" style="padding: 0;"><iframe src="https://jspaint.app"></iframe></div>
</div>

<!-- ОКНО: TIMO CHROME -->
<div id="win-chrome" class="window">
<div class="window-header"><span>Timo Chrome</span><button class="close-btn" onclick="closeWindow('win-chrome')">X</button></div>
<div class="window-content" style="display: flex; align-items: center; justify-content: center; background: #fff;">
<h3 style="color: #777; font-weight: normal;">Еще не доработано</h3>
</div>
</div>

<!-- МЕНЮ ПУСК -->
<div id="start-menu" class="start-menu">
<h4 style="margin: 0 0 10px 8px; color: #1e395b; font-size: 14px;">TimoNiki 7</h4>
<div class="start-menu-item" onclick="openWindow('win-explorer'); toggleStart();">Проводник</div>
<div class="start-menu-item" onclick="openWindow('win-notepad'); toggleStart();">Блокнот</div>
<div class="start-menu-item" onclick="openWindow('win-paint'); toggleStart();">Paint</div>
<div class="start-menu-item" onclick="openWindow('win-chrome'); toggleStart();">Timo Chrome</div>
</div>

<!-- ПАНЕЛЬ ЗАДАЧ -->
<div class="taskbar">
<div class="start-btn" onclick="toggleStart()"></div>
<div class="system-tray">
<div id="clock-time">00:00</div>
<div id="clock-date">01.01.2026</div>
</div>
</div>

<!-- СКРИПТЫ -->
<script>
function openWindow(id) {
const win = document.getElementById(id);
win.style.display = 'flex';
bringToFront(win);
}
function closeWindow(id) { document.getElementById(id).style.display = 'none'; }
function toggleStart() {
const menu = document.getElementById('start-menu');
menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}
document.querySelector('.desktop').addEventListener('click', () => {
document.getElementById('start-menu').style.display = 'none';
});

let maxZIndex = 10;
function bringToFront(win) { maxZIndex++; win.style.zIndex = maxZIndex; }
document.querySelectorAll('.window').forEach(win => {
win.addEventListener('mousedown', () => bringToFront(win));
});

document.querySelectorAll('.window').forEach(win => {
const header = win.querySelector('.window-header');
let isDragging = false; let offsetX, offsetY;
header.addEventListener('mousedown', (e) => {
if (e.target.classList.contains('close-btn')) return;
isDragging = true; offsetX = e.clientX - win.offsetLeft; offsetY = e.clientY - win.offsetTop;
bringToFront(win);
});
document.addEventListener('mousemove', (e) => {
if (!isDragging) return;
win.style.left = (e.clientX - offsetX) + 'px'; win.style.top = (e.clientY - offsetY) + 'px';
});
document.addEventListener('mouseup', () => { isDragging = false; });
});

function updateClock() {
const now = new Date();
document.getElementById('clock-time').innerText = ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')};
document.getElementById('clock-date').innerText = ${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()};
}
updateClock(); setInterval(updateClock, 1000);
</script>
</body>
</html>
