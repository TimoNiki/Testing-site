<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimoNiki 7</title>
<style>
/* Базовые настройки экрана /
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body {
background: #3a6ea5; / Синий цвет, если картинка не загрузится /
background-image: url('wallpaper.jpg'); / ЗАМЕНИТЕ НА ВАШИ ОБОИ */
background-size: cover;
background-position: center;
height: 100vh;
overflow: hidden;
position: relative;
}

/* Сетка для иконок на Рабочем столе */
.desktop {
padding: 20px;
display: grid;
grid-template-columns: repeat(auto-fill, 80px);
grid-gap: 20px;
justify-content: start;
}

/* Стиль одной иконки */
.icon {
width: 80px;
text-align: center;
cursor: pointer;
color: white;
text-shadow: 1px 1px 3px black;
font-size: 12px;
border-radius: 4px;
padding: 5px;
}
.icon:hover {
background: rgba(255, 255, 255, 0.2);
}
.icon img {
width: 48px;
height: 48px;
display: block;
margin: 0 auto 5px;
}

/* Общий стиль для Окон /
.window {
position: absolute;
top: 100px;
left: 100px;
width: 400px;
height: 300px;
background: rgba(240, 240, 240, 0.95);
border: 1px solid #707070;
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
border-radius: 5px 5px 0 0;
display: none; / Изначально окна скрыты */
flex-direction: column;
z-index: 10;
}

/* Шапка окна (в стиле Aero) */
.window-header {
background: linear-gradient(to bottom, #b0d4f3, #88bcda);
padding: 5px 10px;
display: flex;
justify-content: space-between;
align-items: center;
border-radius: 4px 4px 0 0;
cursor: move;
font-weight: bold;
font-size: 13px;
color: #1e395b;
}
.close-btn {
background: #e81123;
color: white;
border: none;
width: 25px;
height: 20px;
cursor: pointer;
border-radius: 3px;
}

/* Содержимое окон */
.window-content {
padding: 10px;
flex-grow: 1;
overflow: auto;
}
.window-content textarea {
width: 100%;
height: 100%;
border: none;
resize: none;
outline: none;
}
.window-content iframe {
width: 100%;
height: 100%;
border: none;
}

/* Панель задач (Таскбар) */
.taskbar {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
height: 40px;
background: linear-gradient(to bottom, rgba(40,40,40,0.8), rgba(10,10,10,0.8));
backdrop-filter: blur(5px);
display: flex;
align-items: center;
padding: 0 10px;
z-index: 100;
}

/* Кнопка Пуск (TimoNiki 7) /
.start-btn {
width: 36px;
height: 36px;
border-radius: 50%;
background: #4caf50; / ЗАМЕНИТЕ НА ВАШУ КАРТИНКУ ПУСКА */
cursor: pointer;
box-shadow: 0 0 5px rgba(255,255,255,0.5);
border: 2px solid #fff;
}
.start-btn:hover { transform: scale(1.05); }

/* Меню Пуск */
.start-menu {
position: fixed;
bottom: 45px;
left: 5px;
width: 250px;
background: white;
border: 1px solid #ccc;
box-shadow: 0 0 10px rgba(0,0,0,0.5);
display: none;
padding: 10px;
border-radius: 5px;
z-index: 99;
}
.start-menu-item {
padding: 8px;
cursor: pointer;
display: flex;
align-items: center;
}
.start-menu-item:hover { background: #e0e0e0; }
</style>
</head>
<body>

<!-- РАБОЧИЙ СТОЛ -->
<div class="desktop">
<!-- Проводник -->
<div class="icon" onclick="openWindow('win-explorer')">
<img src="explorer-icon.png" alt="Проводник"> <!-- ЗАМЕНИТЕ ПУТЬ К ИКОНКЕ -->
Проводник
</div>
<!-- Блокнот -->
<div class="icon" onclick="openWindow('win-notepad')">
<img src="notepad-icon.png" alt="Блокнот"> <!-- ЗАМЕНИТЕ ПУТЬ К ИКОНКЕ -->
Блокнот
</div>
<!-- Paint -->
<div class="icon" onclick="openWindow('win-paint')">
<img src="paint-icon.png" alt="Paint"> <!-- ЗАМЕНИТЕ ПУТЬ К ИКОНКЕ -->
Paint
</div>
<!-- Timo Chrome -->
<div class="icon" onclick="openWindow('win-chrome')">
<img src="chrome-icon.png" alt="Timo Chrome"> <!-- ЗАМЕНИТЕ ПУТЬ К ИКОНКЕ -->
Timo Chrome
</div>
</div>

<!-- ОКНО: ПРОВОДНИК -->
<div id="win-explorer" class="window">
<div class="window-header">
<span>Проводник</span>
<button class="close-btn" onclick="closeWindow('win-explorer')">X</button>
</div>
<div class="window-content">
<p>📂 Компьютер / Локальный диск (C:)</p>
<hr style="margin: 10px 0;">
<ul>
<li>Папка 1</li>
<li>Папка 2</li>
<li>Секретные файлы.txt</li>
</ul>
</div>
</div>

<!-- ОКНО: БЛОКНОТ -->
<div id="win-notepad" class="window">
<div class="window-header">
<span>Блокнот</span>
<button class="close-btn" onclick="closeWindow('win-notepad')">X</button>
</div>
<div class="window-content">
<textarea placeholder="Введите текст здесь..."></textarea>
</div>
</div>

<!-- ОКНО: PAINT -->
<div id="win-paint" class="window" style="width: 500px; height: 400px;">
<div class="window-header">
<span>Paint</span>
<button class="close-btn" onclick="closeWindow('win-paint')">X</button>
</div>
<div class="window-content" style="padding: 0;">
<!-- Вставляем онлайн-рисовалку для симуляции Paint -->
<iframe src="https://jspaint.app"></iframe>
</div>
</div>

<!-- ОКНО: TIMO CHROME -->
<div id="win-chrome" class="window">
<div class="window-header">
<span>Timo Chrome</span>
<button class="close-btn" onclick="closeWindow('win-chrome')">X</button>
</div>
<div class="window-content" style="display: flex; align-items: center; justify-content: center; background: #fff;">
<h3 style="color: gray;">Еще не доработано</h3>
</div>
</div>

<!-- МЕНЮ ПУСК -->
<div id="start-menu" class="start-menu">
<h4 style="margin-bottom: 10px; color: #1e395b;">TimoNiki 7</h4>
<div class="start-menu-item" onclick="openWindow('win-explorer'); toggleStart();">Проводник</div>
<div class="start-menu-item" onclick="openWindow('win-notepad'); toggleStart();">Блокнот</div>
<div class="start-menu-item" onclick="openWindow('win-paint'); toggleStart();">Paint</div>
<div class="start-menu-item" onclick="openWindow('win-chrome'); toggleStart();">Timo Chrome</div>
</div>

<!-- ПАНЕЛЬ ЗАДАЧ -->
<div class="taskbar">
<div class="start-btn" onclick="toggleStart()"></div>
</div>

<!-- СКРИПТЫ УПРАВЛЕНИЯ -->
<script>
// Открыть окно
function openWindow(id) {
document.getElementById(id).style.display = 'flex';
}

// Закрыть окно
function closeWindow(id) {
document.getElementById(id).style.display = 'none';
}

// Показать/скрыть пуск
function toggleStart() {
const menu = document.getElementById('start-menu');
menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// Закрывать Пуск, если кликнули по рабочему столу
document.querySelector('.desktop').addEventListener('click', () => {
document.getElementById('start-menu').style.display = 'none';
});
</script>
</body>
</html>
